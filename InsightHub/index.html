<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsightHub – AutoEDA Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body>
  <header class="custom-header shadow-sm">
    <div class="container-fluid d-flex justify-content-between align-items-center flex-wrap py-2">
      <div class="d-flex align-items-center gap-3">
        <img src="/assets/Yellow_and_Green_Modern_Logo-removebg-preview.png" alt="Logo" class="logo" />
        <h1 class="dashboard-title m-0">INSIGHT-HUB</h1>
      </div>
      <nav class="nav-menu mt-2 mt-md-0">
        <ul class="nav gap-3">
          <li class="nav-item">
            <a class="nav-link" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Contact</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="profile.html">Profile</a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container mt-5">
    <div class="text-center mb-5">
      <h2>Welcome to INSIGHT-HUB</h2>
      <p class="lead"><b>Upload your dataset and get instant visual insights.</b></p>
    </div>

    <!-- Upload Section -->
    <div class="upload-area bg-white shadow p-4 rounded mx-auto" style="max-width: 600px;">
      <form id="uploadForm" enctype="multipart/form-data">
        <div class="mb-3">
          <label for="datasetFile" class="form-label">Choose CSV or JSON file:</label>
          <input class="form-control" type="file" id="datasetFile" name="file" accept=".csv, .json" required />
        </div>
        <button type="submit" class="btn btn-success w-100">Upload & Analyze</button>
      </form>
      <div id="uploadStatus" class="mt-3 text-center"></div>
    </div>

  </main>
  <script src="script.js"></script>

</body>

</html>
